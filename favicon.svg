<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 26" width="32" height="26">
  <!-- cream background with rounded corners -->
  <rect width="32" height="26" rx="3" fill="#fbf6f3"/>

  <!-- "uk" text -->
  <text x="16" y="12"
    font-family="Arial, sans-serif"
    font-weight="900"
    font-size="10"
    fill="#101820"
    text-anchor="middle"
    letter-spacing="-0.3">uk</text>

  <!-- lash illustration: radiating lines from a central arc -->
  <!-- base arc (upper eyelid line) -->
  <path d="M6 19 Q16 16 26 19" stroke="#101820" stroke-width="1.1" fill="none" stroke-linecap="round"/>

  <!-- lash strokes radiating downward -->
  <line x1="6"  y1="19" x2="4"   y2="24"   stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="8"  y1="18" x2="6.5" y2="23.5" stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="10" y1="17.3" x2="9"   y2="23"   stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="12" y1="16.8" x2="11.5" y2="22.5" stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="14" y1="16.5" x2="14"  y2="22"   stroke="#101820" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="16" y1="16.4" x2="16"  y2="22"   stroke="#101820" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="18" y1="16.5" x2="18"  y2="22"   stroke="#101820" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="20" y1="16.8" x2="20.5" y2="22.5" stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="22" y1="17.3" x2="23"  y2="23"   stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="24" y1="18"   x2="25.5" y2="23.5" stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
  <line x1="26" y1="19"   x2="28"  y2="24"   stroke="#101820" stroke-width="1"   stroke-linecap="round"/>
</svg>
